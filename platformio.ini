; PlatformIO Project Configuration File
;
; ESP32_7inch_KMB_NOTE — ESP32-S3 800x480 RGB touch display
; See PIN_ASSIGNMENT.md? — superseded; the on-board LCD is wired by the board itself.
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_dir = .pio-reflash
data_dir = .pio-data

[env:esp32-s3-touch-lcd-7]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
board = esp32-s3-devkitc1-n8r8

; The chip reports 16 MB physical flash. The live partition table deliberately
; uses the 8 MB-compatible factory layout, with LittleFS at 0x5D0000. Keep this
; layout so deployment matches the installed device exactly.
board_upload.flash_size = 8MB
board_upload.maximum_size = 6029312
board_build.flash_size = 8MB
board_build.partitions = partitions_8MB_littlefs.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.filesystem = littlefs

lib_archive = no
monitor_speed = 115200
upload_speed = 115200

; Enable the platform's supported link-time optimization path. The firmware
; must remain at or below the independent 0x5B0000 (5,963,776-byte) budget.
build_unflags =
    -fno-lto

lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git#92b790ed6d24b0678e2f45b1fc85f0abd2d41b33
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#f67d0615cdf2322749635569512dc1e4e689f00e
    esp-arduino-libs/esp-lib-utils@0.3.0
    lvgl/lvgl@8.4.0
    bblanchon/ArduinoJson@7.4.3

build_flags =
    -std=gnu++17
    -flto=1
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_ESP32S3_DEV
    -D LV_CONF_INCLUDE_SIMPLE
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_LVGL_PORT_AVOID_TEARING_MODE=1
    -Iinclude

build_src_filter =
    +<*>
    -<ui/ui_img_1167879829.c>
    -<ui/ui_img_261349413.c>
    -<ui/ui_img_783909477.c>

extra_scripts =
    pre:scripts/stage_littlefs.py
    post:scripts/check_firmware_size.py

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -std=gnu++17
    -D UNIT_TEST
build_src_filter =
    +<ScheduleModel.cpp>
    +<KmbFavoriteModel.cpp>
    +<KmbCatalogModel.cpp>
    +<HkoForecastModel.cpp>
    +<GoogleTaskModel.cpp>
    +<DashboardModel.cpp>
    +<KmbRouteCache.cpp>
