<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>今日資訊屏－日程設定</title>
  <style>
    :root{font-family:system-ui,"Noto Sans TC",sans-serif;color:#17202a;background:#f3f6f8}
    body{max-width:760px;margin:auto;padding:20px}h1{font-size:1.6rem;margin-bottom:4px}
    .sub{color:#5d6d7e;margin:0 0 18px}.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px #0001}
    .row{display:grid;grid-template-columns:110px 1fr auto;gap:8px;margin-bottom:12px;align-items:center}
    input,button{font:inherit;border:1px solid #ccd1d1;border-radius:9px;padding:10px}button{cursor:pointer}
    .delete{color:#a93226;background:#fff}.days{display:flex;gap:4px;flex-wrap:wrap;grid-column:2/4}
    .days label{background:#edf2f7;border-radius:8px;padding:6px;font-size:.9rem}
    .actions{display:flex;gap:10px;margin-top:16px}.primary{background:#1261a0;color:white;border:0}
    #status{margin-top:12px;min-height:1.5em}@media(max-width:520px){.row{grid-template-columns:90px 1fr}.delete{grid-column:2}.days{grid-column:1/3}}
  </style>
</head>
<body>
  <h1>日程設定</h1>
  <p class="sub">加入每日活動；資訊屏會按星期同時間自動排序。最多 24 項。</p>
  <div class="card">
    <div id="items"></div>
    <div class="actions">
      <button id="add">＋ 新增日程</button>
      <button id="save" class="primary">儲存日程</button>
      <button onclick="location.href='/'">返回巴士設定</button>
    </div>
    <div id="status"></div>
  </div>
<script>
const dayNames=['日','一','二','三','四','五','六'];let config={};
function row(item={time:'09:00',title:'',days_mask:127}){
  const el=document.createElement('div');el.className='row';
  el.innerHTML=`<input class="time" type="time" value="${item.time||'09:00'}" aria-label="時間">
    <input class="title" maxlength="24" value="${String(item.title||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" placeholder="活動名稱，例如：英文課">
    <button class="delete">刪除</button><div class="days"></div>`;
  const days=el.querySelector('.days');dayNames.forEach((name,i)=>{const label=document.createElement('label');
    label.innerHTML=`<input type="checkbox" data-day="${i}" ${(item.days_mask&(1<<i))?'checked':''}>星期${name}`;days.appendChild(label)});
  el.querySelector('.delete').onclick=()=>el.remove();document.querySelector('#items').appendChild(el);
}
function collect(){return [...document.querySelectorAll('.row')].map(el=>{let mask=0;
  el.querySelectorAll('[data-day]:checked').forEach(c=>mask|=1<<Number(c.dataset.day));
  return{time:el.querySelector('.time').value,title:el.querySelector('.title').value.trim(),days_mask:mask};
}).filter(x=>x.time&&x.title&&x.days_mask).slice(0,24)}
function status(text,ok=true){const el=document.querySelector('#status');el.textContent=text;el.style.color=ok?'#1e8449':'#b03a2e'}
fetch('/api/config').then(r=>r.json()).then(c=>{config=c;(c.agenda||[]).forEach(row);if(!(c.agenda||[]).length)row()}).catch(()=>status('未能讀取設定，請重新整理。',false));
document.querySelector('#add').onclick=()=>document.querySelectorAll('.row').length<24?row():status('最多只可加入 24 項日程。',false);
document.querySelector('#save').onclick=()=>{config.agenda=collect();fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(config)})
 .then(r=>{if(!r.ok)throw Error();return r.json()}).then(()=>status('日程已儲存；資訊屏會自動更新。')).catch(()=>status('儲存失敗，請再試一次。',false));};
</script>
</body></html>
